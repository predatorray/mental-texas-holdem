name: Coverage Report

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  unit:
    name: unit-coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Generate Coverage Report
        run: npm run test -- --coverage .
      - name: Upload coverage reports to Github
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: unit-coverage
          path: coverage/
          retention-days: 30

  e2e:
    name: e2e-coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run e2e tests with coverage
        run: COVERAGE=1 npx playwright test --project=chromium
      - name: Generate e2e coverage report
        if: ${{ !cancelled() }}
        run: ./node_modules/.bin/nyc report --reporter=lcov --report-dir=coverage/e2e
      - name: Upload e2e coverage reports to Github
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: e2e-coverage
          path: coverage/e2e/
          retention-days: 30

  upload:
    name: upload-coverage
    needs: [unit, e2e]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download unit coverage
        uses: actions/download-artifact@v4
        with:
          name: unit-coverage
          path: coverage/unit
        continue-on-error: true
      - name: Download e2e coverage
        uses: actions/download-artifact@v4
        with:
          name: e2e-coverage
          path: coverage/e2e
        continue-on-error: true
      - name: Upload unit coverage to Codecov
        if: ${{ hashFiles('coverage/unit/lcov.info') != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/unit/lcov.info
          flags: unit
      - name: Upload e2e coverage to Codecov
        if: ${{ hashFiles('coverage/e2e/lcov.info') != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/e2e/lcov.info
          flags: e2e
